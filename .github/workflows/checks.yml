name: Checks

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify contracts
    runs-on: code-code-k8s
    timeout-minutes: 30
    env:
      GOTOOLCHAIN: local
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Guard repository boundary
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n "pull""_request:" .github/workflows 2>/dev/null; then
            echo "::error::public self-hosted CI must not run on pull_request events"
            exit 1
          fi
          network_pattern='go''proxy\.cn|npm''mirror|tuna\.tsing''hua|mirrors\.ali''yun|mirrors\.hua''weicloud|192\.168\.0\.115:10809|ghcr\.m\.dao''cloud'
          if git grep -n -E "$network_pattern" -- ':!**/go.sum' ':!**/pnpm-lock.yaml'; then
            echo "::error::repository must stay free of committed local mirror or proxy values"
            exit 1
          fi
          credential_pattern='(gh[pousr]_[A-Za-z0-9_]{30,}|github_''pat_[A-Za-z0-9_]+|://[^/@[:space:]]+:[^/@[:space:]]+@|_auth''Token=|(^|[[:space:]])Authori''zation:[[:space:]]|pass''word=|sec''ret=|api''key=|api_''key=)'
          if git grep -n -E "$credential_pattern" -- ':!**/go.sum' ':!**/pnpm-lock.yaml'; then
            echo "::error::credential-looking material is not allowed in the repository"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/go-contract/go.mod
          cache: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Lint proto
        working-directory: packages/proto
        run: buf lint

      - name: Regenerate contracts
        run: |
          set -euo pipefail
          (cd packages/proto && buf generate)
          git diff --exit-code -- packages/go-contract packages/agent-contract/src/gen

      - name: Test Go contracts
        working-directory: packages/go-contract
        run: go test ./...

      - name: Build TypeScript contracts
        working-directory: packages/agent-contract
        run: |
          pnpm install --frozen-lockfile
          pnpm build
