syntax = "proto3";

package platform.provider.v1;

import "google/protobuf/timestamp.proto";
import "api_protocol/v1/protocol.proto";
import "provider/v1/provider.proto";
import "platform/provider/v1/provider_shared.proto";
import "platform/support/v1/support_service.proto";

option go_package = "code-code.internal/go-contract/platform/provider/v1;providerservicev1";

service ProviderService {
  rpc ListProviderSurfaces(ListProviderSurfacesRequest) returns (ListProviderSurfacesResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse);
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse);
  rpc ApplyProviderModelCatalog(ApplyProviderModelCatalogRequest) returns (ApplyProviderModelCatalogResponse);
  rpc ApplyProviderProbeStatus(ApplyProviderProbeStatusRequest) returns (ApplyProviderProbeStatusResponse);
  rpc ProbeProviderObservability(ProbeProviderObservabilityRequest) returns (ProbeProviderObservabilityResponse);
  rpc ProbeProviderModelCatalog(ProbeProviderModelCatalogRequest) returns (ProbeProviderModelCatalogResponse);
  rpc WatchProviderStatusEvents(WatchProviderStatusEventsRequest) returns (stream WatchProviderStatusEventsResponse);
  rpc ListVendors(ListVendorsRequest) returns (ListVendorsResponse);

  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc ApplyTemplate(ApplyTemplateRequest) returns (ApplyTemplateResponse);
}

message ListProviderSurfacesRequest {}

message ListProviderSurfacesResponse {
  repeated platform.support.v1.Surface items = 1;
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated ProviderView items = 1;
}

message ProviderView {
  string provider_id = 1;
  string display_name = 2;
  reserved 3;
  reserved "vendor_id";
  string provider_credential_id = 4;
  reserved 5;
  reserved "surfaces";
  reserved 6;
  reserved "icon_url";
  reserved 7;
  reserved "credential_subject_summary";
  reserved 9;
  reserved "default_model_id";
  .provider.v1.ProviderModelCatalog model_catalog = 10;
  repeated .provider.v1.ProviderModel models = 17;
  repeated .provider.v1.ProviderEndpoint endpoints = 18;
  ProviderObservabilityView observability = 19;
  .provider.v1.ProviderProbeStatus probe_status = 20;

  // Flat surface fields (Provider 1:1 Surface).
  string surface_id = 13;
  .provider.v1.ProviderSurfaceRuntime runtime = 14;
  string product_info_id = 15;
  ProviderStatus status = 16;
}

message ProviderObservabilityView {
  string observability_policy_id = 1;
  ProviderObservabilityStatus status = 2;
}

message ProviderObservabilityStatus {
  bool supports_quota = 1;
  bool supports_model_usage = 2;
  bool supports_account_summary = 3;
}

message ProviderStatus {
  ProviderPhase phase = 1;
  string reason = 2;
}

message UpsertProviderRequest {
  string display_name = 1;
  string surface_id = 2;
  repeated .provider.v1.ProviderModel models = 10;
  string provider_credential_id = 13;
  .provider.v1.ProviderSurfaceRuntime runtime = 14;
  string provider_id = 16;
}

message CreateProviderRequest {
  UpsertProviderRequest provider = 1;
}

message CreateProviderResponse {
  ProviderView provider = 1;
}

message UpdateProviderRequest {
  string provider_id = 1;
  UpsertProviderRequest provider = 2;
}

message UpdateProviderResponse {
  ProviderView provider = 1;
}

message ApiKeyAuthenticationUpdateMaterial {
  string api_key = 1;
}

message CLIOAuthAuthenticationUpdateMaterial {}

message UpdateProviderAuthenticationRequest {
  string provider_id = 1;

  oneof auth_material {
    ApiKeyAuthenticationUpdateMaterial api_key = 2;
    CLIOAuthAuthenticationUpdateMaterial cli_oauth = 3;
  }
}

message UpdateProviderAuthenticationResponse {
  oneof outcome {
    ProviderView provider = 1;
    ProviderConnectSessionView session = 2;
  }
}

message SessionMaterial {
  string schema_id = 1;
  map<string, string> values = 2;
  repeated string required_keys = 3;
}

message UpdateProviderObservabilityAuthenticationRequest {
  string provider_id = 1;
  SessionMaterial session_material = 2;
}

message UpdateProviderObservabilityAuthenticationResponse {
  ProviderView provider = 1;
}

message DeleteProviderRequest {
  string provider_id = 1;
}

message DeleteProviderResponse {
  string status = 1;
}



message ApiKeyConnectMaterial {
  string credential_id = 1;
  string base_url = 2;
  api_protocol.v1.Protocol protocol = 3;
  repeated ProviderSurfaceModelCatalog surface_model_catalogs = 4;
  repeated .provider.v1.ProviderModel models = 5;
}

message CLIOAuthConnectMaterial {}

message ProviderSurfaceModelCatalog {
  string surface_id = 1;
  repeated .provider.v1.ProviderModelCatalogEntry models = 2;
}

message ConnectProviderRequest {
  string vendor_id = 8;
  string cli_id = 9;
  string display_name = 3;
  ProviderAddMethod add_method = 7;
  string surface_id = 10;

  oneof auth_material {
    ApiKeyConnectMaterial api_key = 5;
    CLIOAuthConnectMaterial cli_oauth = 6;
  }
}

message ProviderConnectSessionView {
  string session_id = 1;
  string oauth_session_id = 2;
  ProviderConnectSessionPhase phase = 3;
  string display_name = 4;
  string authorization_url = 5;
  string user_code = 6;
  string message = 7;
  string error_message = 8;
  ProviderView provider = 9;
  ProviderAddMethod add_method = 10;
  string vendor_id = 11;
  string cli_id = 12;
  string surface_id = 13;
}

message ConnectProviderResponse {
  oneof outcome {
    ProviderView provider = 1;
    ProviderConnectSessionView session = 2;
  }
}

message GetProviderConnectSessionRequest {
  string session_id = 1;
}

message GetProviderConnectSessionResponse {
  ProviderConnectSessionView session = 1;
}

message ApplyProviderModelCatalogRequest {
  string provider_id = 1;
  repeated .provider.v1.ProviderModel models = 2;
}

message ApplyProviderModelCatalogResponse {
  ProviderView provider = 1;
}

message ApplyProviderProbeStatusRequest {
  string provider_id = 1;
  .provider.v1.ProviderProbeKind probe_kind = 2;
  .provider.v1.ProviderProbeRunState state = 3;
}

message ApplyProviderProbeStatusResponse {
  ProviderView provider = 1;
}

message ProbeProviderObservabilityRequest {
  string provider_id = 1;
  ProviderObservabilityProbeTrigger trigger = 2;
  repeated string provider_ids = 3;
}

message ProbeProviderObservabilityResponse {
  string provider_id = 1;
  reserved 2;
  reserved "cli_id";
  ProviderOAuthObservabilityProbeOutcome outcome = 3;
  string message = 4;
  string next_allowed_at = 5;
  string last_attempt_at = 6;
  repeated string provider_ids = 7;
  string probe_id = 8;
}

message ProbeProviderModelCatalogRequest {
  string provider_id = 1;
  repeated string provider_ids = 2;
}

message ProbeProviderModelCatalogResponse {
  string provider_id = 1;
  repeated string provider_ids = 2;
  string message = 3;
  string probe_id = 4;
}

message WatchProviderStatusEventsRequest {
  repeated string provider_ids = 1;
}

message WatchProviderStatusEventsResponse {
  ProviderStatusEvent event = 1;
}

message ProviderWorkflowStatus {
  string workflow_id = 1;
  string workflow_kind = 2;
  ProviderWorkflowPhase phase = 3;
  string message = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp finished_at = 6;
}

message ProviderStatusEvent {
  string provider_id = 1;
  string surface_id = 2;
  ProviderStatusEventKind kind = 3;
  ProviderWorkflowStatus workflow = 4;
  ProviderStatus status = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message ListVendorsRequest {}

message ListVendorsResponse {
  repeated VendorView items = 1;
}

message VendorView {
  string vendor_id = 1;
  string display_name = 2;
  string default_base_url = 3;
  string protocol = 4;
  string icon_url = 5;
  repeated string aliases = 7;
}


message ListTemplatesRequest {}

message ListTemplatesResponse {
  repeated TemplateView items = 1;
}

message TemplateView {
  string template_id = 1;
  string display_name = 2;
  string vendor = 3;
  string protocol = 4;
  string default_base_url = 5;
  reserved 6;
  reserved "default_model_id";
  repeated string default_models = 7;
  bool requires_credential = 8;
}

message ApplyTemplateRequest {
  string template_id = 1;
  string namespace = 2;
  string display_name = 3;
  string provider_id = 4;
  reserved 6;
  reserved "default_model_id";
  repeated string allowed_model_ids = 7;
  string provider_credential_id = 10;
}

message ApplyTemplateResult {
  string template_id = 1;
  string namespace = 2;
  string display_name = 3;
  string provider_id = 4;
  repeated string applied_kinds = 5;
  reserved 6;
  reserved "default_model_id";
}

message ApplyTemplateResponse {
  ApplyTemplateResult result = 1;
}
